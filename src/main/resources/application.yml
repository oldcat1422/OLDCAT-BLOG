spring:
  datasource:
    url: jdbc:mysql://localhost:3306/oldcat?serverTimezone=GMT%2B8
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver

mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
  type-aliases-package: com.jh.oldcat
mybatis:
  mapper-locations: classpath:mapper/**.xml
  type-aliases-super-type: com.jh.oldcat.mapper
server:
  port: 8088
redis:
  host: localhost
  port: 6379